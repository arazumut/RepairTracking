{% extends 'core/base.html' %}
{% load static %}

{% block title %}Yeni İş Emri{% endblock %}

{% block content %}
<div class="container-fluid py-4">
    <div class="row">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">Yeni İş Emri</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="{{ form.arac.id_for_label }}">Araç</label>
                                    {{ form.arac }}
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="form-group mb-3">
                                    <label for="{{ form.durum.id_for_label }}">Durum</label>
                                    {{ form.durum }}
                                </div>
                            </div>
                        </div>
                        <div class="form-group mb-3">
                            <label for="{{ form.aciklama.id_for_label }}">Açıklama</label>
                            {{ form.aciklama }}
                        </div>
                        <div class="text-end">
                            <a href="{% url 'isemri_list' %}" class="btn btn-secondary">İptal</a>
                            <button type="submit" class="btn btn-primary">Kaydet</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
